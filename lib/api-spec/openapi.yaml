        target_personas:
          type: array
          items:
            type: string
        pipeline_stage_relevance:
          type: array
          items:
            type: string
        requirements:
          type: string
        document_name:
          type: string
      required:
        - document_type
        - target_personas
        - pipeline_stage_relevance
        - requirements
