openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Unlock Content Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead management
  - name: recommendation
    description: Recommendation engine
  - name: documents
    description: Document registry
  - name: compliance
    description: Compliance constants
  - name: changelog
    description: Changelog operations
  - name: content
    description: Content bank
  - name: gaps
    description: Content gap analysis
  - name: feature-update
    description: Feature update document cascade
  - name: generation
    description: Content generation & QC
  - name: dashboard
    description: Dashboard summaries
  - name: acu
    description: Approved Content Units
  - name: campaigns
    description: Campaign intelligence and multi-channel sequences
  - name: channels
    description: Channel configuration and constraints
  - name: acu-intelligence
    description: ACU Intelligence — scanner, contradiction detector, review backlog, coverage map

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List and search leads
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead with full history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/next-action:
    get:
      operationId: getLeadNextAction
      tags: [leads]
      summary: Get next best action for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next best action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAction"

  /recommendation/analyze:
    post:
      operationId: analyzeTranscript
      tags: [recommendation]
      summary: "Pass 1: Analyze transcript for persona, stage, objections"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTranscriptBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptAnalysis"

  /recommendation/rank:
    post:
      operationId: rankDocuments
      tags: [recommendation]
      summary: "Pass 2: Rank eligible documents"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankDocumentsBody"
      responses:
        "200":
          description: Ranked recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResult"

  /recommendation/confirm-send:
    post:
      operationId: confirmSend
      tags: [recommendation]
      summary: Log a send action against a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmSendBody"
      responses:
        "200":
          description: Send logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendLogEntry"

  /recommendation/email-draft:
    post:
      operationId: generateEmailDraft
      tags: [recommendation]
      summary: Generate a covering email draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailDraftBody"
      responses:
        "200":
          description: Email draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDraft"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents in registry
      parameters:
        - name: tier
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: lifecycle_status
          in: query
          schema:
            type: string
        - name: review_state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a single document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document status or review state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/propagate:
    post:
      operationId: propagateDocumentUpdate
      tags: [documents]
      summary: Trigger propagation after a document update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Propagation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropagationResult"

  /documents/propagation-status:
    get:
      operationId: getPropagationStatus
      tags: [documents]
      summary: Get all documents requiring review
      responses:
        "200":
          description: Propagation alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /gdocs/export/{id}:
    post:
      operationId: exportToGoogleDocs
      tags: [gdocs]
      summary: Export document content to a new Google Doc (or return existing link)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Google Doc link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdocsExportResult"

  /gdocs/import/{id}:
    post:
      operationId: importFromGoogleDocs
      tags: [gdocs]
      summary: Pull latest content from linked Google Doc back into the registry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                edit_override:
                  type: boolean
                  description: Set to true to confirm importing into a Tier 1 foundational document
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdocsImportResult"

  /gdocs/status/{id}:
    get:
      operationId: getGdocsStatus
      tags: [gdocs]
      summary: Check if a document is linked to a Google Doc
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Google Docs link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdocsStatus"

  /compliance-constants:
    get:
      operationId: getComplianceConstants
      tags: [compliance]
      summary: Get all compliance constants
      responses:
        "200":
          description: Compliance constants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceConstants"

  /changelog:
    get:
      operationId: listChangelog
      tags: [changelog]
      summary: List changelog entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: document_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Changelog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangelogEntry"

  /content-bank:
    get:
      operationId: getContentBank
      tags: [content]
      summary: Get the content bank
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Content bank sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentBank"

  /content-bank/personas:
    get:
      operationId: getPersonas
      tags: [content]
      summary: Get compact persona reference
      responses:
        "200":
          description: Persona list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"

  /content/gaps:
    get:
      operationId: getContentGaps
      tags: [gaps]
      summary: Detect content gaps across coverage matrix, document types, and recommendation failures
      responses:
        "200":
          description: Gap analysis results with information readiness assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GapAnalysisResult"

  /content/generate-brief:
    post:
      operationId: generateBrief
      tags: [gaps]
      summary: Generate a structured content brief for a detected gap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBriefRequest"
      responses:
        "200":
          description: Generated brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBriefResponse"
        "422":
          description: Insufficient information to generate brief

  /content/generate-from-brief:
    post:
      operationId: generateFromBrief
      tags: [gaps]
      summary: Generate a document from a gap brief using the content generation pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFromBriefRequest"
      responses:
        "200":
          description: Generated document with QC report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"
        "422":
          description: Brief has unresolved information gaps

  /content/feature-update:
    post:
      operationId: submitFeatureUpdate
      tags: [feature-update]
      summary: Submit a feature update and identify affected documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureUpdateRequest"
      responses:
        "200":
          description: Feature update results with affected documents and review queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureUpdateResult"

  /content/feature-update/{updateId}/queue:
    get:
      operationId: getFeatureUpdateQueue
      tags: [feature-update]
      summary: Get the current review queue status for a feature update
      parameters:
        - name: updateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureUpdateQueue"

  /generation/generate:
    post:
      operationId: generateDocument
      tags: [generation]
      summary: Generate a document from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationBrief"
      responses:
        "200":
          description: Generated document with QC report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"

  /generation/{id}/regenerate:
    post:
      operationId: regenerateDocument
      tags: [generation]
      summary: Regenerate a document with QC failures as constraints
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Regeneration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"

  /generation/{id}/qc-rerun:
    post:
      operationId: qcRerunDocument
      tags: [generation]
      summary: Re-run QC evaluation on existing document content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QC re-run result
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_id:
                    type: string
                  review_state:
                    type: string
                  qc_report:
                    type: object

  /generation/{id}/promote:
    post:
      operationId: promoteDocument
      tags: [generation]
      summary: Promote a DRAFT document to CURRENT
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Promoted document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangelogEntry"

  /seed-validation:
    get:
      operationId: getSeedValidation
      tags: [health]
      summary: Validate seed data integrity
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedValidation"

  /acu:
    get:
      operationId: listACUs
      tags: [acu]
      summary: List all Approved Content Units
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, APPROVED, LOCKED, LEGAL_PENDING, NAMING_PENDING, SUPERSEDED]
        - name: type
          in: query
          schema:
            type: string
            enum: [fact, framing, reference, explanation, qualifier, prohibited]
      responses:
        "200":
          description: List of ACUs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ACU"
    post:
      operationId: createACU
      tags: [acu]
      summary: Create a new ACU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateACUInput"
      responses:
        "201":
          description: ACU created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACU"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: ACU already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/prohibited:
    get:
      operationId: listProhibitedACUs
      tags: [acu]
      summary: List prohibited content units (LOCKED + prohibited type)
      responses:
        "200":
          description: List of prohibited ACUs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ACU"

  /acu/injectable:
    get:
      operationId: listInjectableACUs
      tags: [acu]
      summary: List injectable content units (LOCKED, non-prohibited)
      responses:
        "200":
          description: List of injectable ACUs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ACU"

  /acu/{id}:
    get:
      operationId: getACU
      tags: [acu]
      summary: Get a single ACU with version history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ACU with version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACUDetail"
        "404":
          description: ACU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/{id}/approve:
    patch:
      operationId: approveACU
      tags: [acu]
      summary: Approve a DRAFT ACU
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved_by:
                  type: string
      responses:
        "200":
          description: ACU approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACU"
        "400":
          description: Cannot approve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: ACU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/{id}/lock:
    patch:
      operationId: lockACU
      tags: [acu]
      summary: Lock an APPROVED ACU (makes content immutable)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ACU locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACU"
        "400":
          description: Cannot lock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: ACU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/{id}/version:
    post:
      operationId: versionACU
      tags: [acu]
      summary: Create a new version of an existing ACU
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                source:
                  type: string
                notes:
                  type: string
      responses:
        "201":
          description: New version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACU"
        "404":
          description: ACU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/{id}/cascade:
    patch:
      operationId: cascadeACU
      tags: [acu]
      summary: Trigger cascade review for all documents referencing this ACU
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cascade result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACUCascadeResult"
        "404":
          description: ACU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/scan:
    post:
      operationId: scanAllDocuments
      tags: [acu-intelligence]
      summary: Run intelligence scan on all CURRENT documents, extract candidates, detect contradictions
      responses:
        "200":
          description: Scan results with candidates and contradiction counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanAllResult"
        "500":
          description: Scan error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/scan/{document_id}:
    post:
      operationId: scanSingleDocument
      tags: [acu-intelligence]
      summary: Scan a single document for candidate content units
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single document scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentScanResult"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acu/backlog:
    get:
      operationId: getACUBacklog
      tags: [acu-intelligence]
      summary: Get candidate content units pending review, priority-ordered
      parameters:
        - name: importance
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Backlog with summary and candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklogResponse"

  /acu/backlog/contradictions:
    get:
      operationId: getACUContradictions
      tags: [acu-intelligence]
      summary: Get all contradictions sorted by severity
      responses:
        "200":
          description: Contradictions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContradictionsResponse"

  /acu/backlog/{id}/approve:
    patch:
      operationId: approveBacklogCandidate
      tags: [acu-intelligence]
      summary: Approve a candidate, creating a new ACU
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lock_immediately:
                  type: boolean
                approved_by:
                  type: string
      responses:
        "200":
          description: Approved candidate with new ACU
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidate_id:
                    type: string
                  acu_id:
                    type: string
                  acu:
                    type: object
        "404":
          description: Candidate not found

  /acu/backlog/{id}/reject:
    patch:
      operationId: rejectBacklogCandidate
      tags: [acu-intelligence]
      summary: Reject a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rejected_by:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Candidate rejected

  /acu/backlog/{id}/defer:
    patch:
      operationId: deferBacklogCandidate
      tags: [acu-intelligence]
      summary: Defer a candidate for later review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate deferred

  /acu/backlog/{id}/duplicate:
    patch:
      operationId: markBacklogDuplicate
      tags: [acu-intelligence]
      summary: Mark a candidate as duplicate of existing ACU
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                existing_acu_id:
                  type: string
      responses:
        "200":
          description: Candidate marked as duplicate

  /acu/contradictions/{id}/resolve:
    patch:
      operationId: resolveContradiction
      tags: [acu-intelligence]
      summary: Resolve a contradiction with notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution:
                  type: string
                resolved_by:
                  type: string
      responses:
        "200":
          description: Contradiction resolved

  /acu/coverage:
    get:
      operationId: getACUCoverage
      tags: [acu-intelligence]
      summary: Get belief coverage map showing ACU coverage per investor belief
      responses:
        "200":
          description: Coverage map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageResponse"

  /acu/scan-log:
    get:
      operationId: getACUScanLog
      tags: [acu-intelligence]
      summary: Get scan history
      responses:
        "200":
          description: Scan log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanLogEntry"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignBriefInput"
      responses:
        "201":
          description: Campaign created with sequence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignCreateResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Campaign already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get full campaign detail with assets and channel summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignDetail"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{id}/assets:
    get:
      operationId: getCampaignAssets
      tags: [campaigns]
      summary: Get all content assets for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of campaign assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAsset"

  /campaigns/{id}/generate:
    post:
      operationId: generateCampaignAssets
      tags: [campaigns]
      summary: Generate all pending content assets from the campaign brief
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignGenerateResult"

  /campaigns/{id}/qc:
    get:
      operationId: runCampaignQC
      tags: [campaigns]
      summary: Run QC across all campaign assets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign QC result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignQCResult"

  /campaigns/{id}/activate:
    patch:
      operationId: activateCampaign
      tags: [campaigns]
      summary: Activate campaign (blocks if QC not passed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Cannot activate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{id}/sequence:
    get:
      operationId: getCampaignSequence
      tags: [campaigns]
      summary: Get machine-readable sequence specification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sequence specification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignSequence"

  /campaigns/{id}/ac-build:
    get:
      operationId: getCampaignACBuild
      tags: [campaigns]
      summary: Get ActiveCampaign build instructions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ActiveCampaign build instructions
          content:
            application/json:
              schema:
                type: object

  /campaigns/{id}/tag-table:
    get:
      operationId: getCampaignTagTable
      tags: [campaigns]
      summary: Get Aircall tag trigger table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Aircall tag table
          content:
            application/json:
              schema:
                type: object

  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List all channel configurations
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"

  /channels/{id}:
    get:
      operationId: getChannel
      tags: [channels]
      summary: Get a single channel configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Channel configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Lead:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        company:
          type: ["string", "null"]
        pipeline_stage:
          type: string
        first_contact:
          type: string
        last_contact:
          type: string
        detected_persona:
          type: ["string", "null"]
        archived:
          type: boolean
        send_count:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - pipeline_stage
        - first_contact
        - last_contact
        - archived
        - send_count
        - created_at
        - updated_at

    LeadDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        company:
          type: ["string", "null"]
        pipeline_stage:
          type: string
        first_contact:
          type: string
        last_contact:
          type: string
        detected_persona:
          type: ["string", "null"]
        archived:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
        send_log:
          type: array
          items:
            $ref: "#/components/schemas/SendLogEntry"
        stage_history:
          type: array
          items:
            $ref: "#/components/schemas/StageHistoryEntry"
        notes:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - pipeline_stage
        - first_contact
        - last_contact
        - archived
        - created_at
        - updated_at
        - send_log
        - stage_history
        - notes

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
        company:
          type: ["string", "null"]
        pipeline_stage:
          type: string
          default: "Outreach"
      required:
        - name

    UpdateLeadBody:
      type: object
      properties:
        pipeline_stage:
          type: string
        detected_persona:
          type: ["string", "null"]
        archived:
          type: boolean
        company:
          type: ["string", "null"]
        notes:
          type: array
          items:
            type: string

    SendLogEntry:
      type: object
      properties:
        send_id:
          type: string
        date:
          type: string
        documents_sent:
          type: array
          items:
            type: string
        pipeline_stage_at_send:
          type: string
        transcript_summary:
          type: string
        analysis_confidence:
          type: object
          properties:
            persona:
              type: number
            stage:
              type: number
          required:
            - persona
            - stage
        already_sent_exclusions:
          type: array
          items:
            type: string
        blocked_documents_seen:
          type: array
          items:
            type: string
        stage_suggestion:
          type: ["string", "null"]
        email_sent:
          type: boolean
        status:
          type: string
      required:
        - send_id
        - date
        - documents_sent
        - pipeline_stage_at_send
        - transcript_summary
        - analysis_confidence
        - already_sent_exclusions
        - blocked_documents_seen
        - email_sent
        - status

    StageHistoryEntry:
      type: object
      properties:
        stage:
          type: string
        date:
          type: string
        logged_by:
          type: string
      required:
        - stage
        - date
        - logged_by

    NextAction:
      type: object
      properties:
        action:
          type: string
        rationale:
          type: string
        suggested_documents:
          type: array
          items:
            type: string
      required:
        - action
        - rationale
        - suggested_documents

    AnalyzeTranscriptBody:
      type: object
      properties:
        transcript:
          type: string
        lead_id:
          type: ["string", "null"]
      required:
        - transcript

    TranscriptAnalysis:
      type: object
      properties:
        detected_persona:
          type: object
          properties:
            name:
              type: string
            confidence_score:
              type: number
            evidence:
              type: array
              items:
                type: string
          required:
            - name
            - confidence_score
            - evidence
        pipeline_stage:
          type: object
          properties:
            stage:
              type: string
            confidence_score:
              type: number
            rationale:
              type: string
          required:
            - stage
            - confidence_score
            - rationale
        objections:
          type: array
          items:
            $ref: "#/components/schemas/Objection"
        transcript_summary:
          type: string
        pipeline_stage_suggestion:
          type: ["string", "null"]
        matrix_context:
          $ref: "#/components/schemas/MatrixContext"
      required:
        - detected_persona
        - pipeline_stage
        - objections
        - transcript_summary

    MatrixContext:
      type: object
      properties:
        eis_familiar:
          type: boolean
        iht_confirmed:
          type: boolean
        adviser_mentioned:
          type: boolean
        derivation_notes:
          type: object
          properties:
            eis_familiar:
              type: string
            iht_confirmed:
              type: string
            adviser_mentioned:
              type: string
          required:
            - eis_familiar
            - iht_confirmed
            - adviser_mentioned
      required:
        - eis_familiar
        - iht_confirmed
        - adviser_mentioned
        - derivation_notes

    Objection:
      type: object
      properties:
        objection:
          type: string
        suggested_response:
          type: string
      required:
        - objection
        - suggested_response

    RankDocumentsBody:
      type: object
      properties:
        lead_id:
          type: ["string", "null"]
        detected_persona:
          type: string
        pipeline_stage:
          type: string
        transcript_summary:
          type: string
        objections:
          type: array
          items:
            type: string
        eis_familiar:
          type: boolean
          default: false
        iht_confirmed:
          type: boolean
          default: false
        adviser_mentioned:
          type: boolean
          default: false
      required:
        - detected_persona
        - pipeline_stage
        - transcript_summary

    RecommendationResult:
      type: object
      properties:
        ranked_documents:
          type: array
          items:
            $ref: "#/components/schemas/RankedDocument"
        already_sent:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSummary"
        blocked_documents:
          type: array
          items:
            $ref: "#/components/schemas/BlockedDocument"
        excluded_documents:
          type: array
          items:
            $ref: "#/components/schemas/ExcludedDocument"
        all_sent_message:
          type: ["string", "null"]
      required:
        - ranked_documents
        - already_sent
        - blocked_documents

    RankedDocument:
      type: object
      properties:
        document_id:
          type: string
        file_code:
          type: string
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
        priority:
          type: integer
        rationale:
          type: string
        relevance_score:
          type: ["number", "null"]
        worth_it:
          type: integer
      required:
        - document_id
        - file_code
        - name
        - description
        - tier
        - priority
        - rationale

    ExcludedDocument:
      type: object
      properties:
        document_id:
          type: string
        file_code:
          type: string
        name:
          type: string
        reason:
          type: string
      required:
        - document_id
        - file_code
        - name
        - reason

    DocumentSummary:
      type: object
      properties:
        document_id:
          type: string
        file_code:
          type: string
        name:
          type: string
        date_sent:
          type: string
      required:
        - document_id
        - file_code
        - name
        - date_sent

    BlockedDocument:
      type: object
      properties:
        document_id:
          type: string
        file_code:
          type: string
        name:
          type: string
        reason:
          type: string
      required:
        - document_id
        - file_code
        - name
        - reason

    ConfirmSendBody:
      type: object
      properties:
        lead_id:
          type: string
        document_ids:
          type: array
          items:
            type: string
        transcript_summary:
          type: string
        detected_persona:
          type: string
        pipeline_stage:
          type: string
        analysis_confidence:
          type: object
          properties:
            persona:
              type: number
            stage:
              type: number
          required:
            - persona
            - stage
        stage_suggestion:
          type: ["string", "null"]
        email_sent:
          type: boolean
        already_sent_exclusions:
          type: array
          items:
            type: string
        blocked_documents_seen:
          type: array
          items:
            type: string
      required:
        - lead_id
        - document_ids
        - transcript_summary
        - detected_persona
        - pipeline_stage
        - analysis_confidence
        - email_sent

    EmailDraftBody:
      type: object
      properties:
        lead_name:
          type: string
        detected_persona:
          type: string
        pipeline_stage:
          type: string
        document_names:
          type: array
          items:
            type: string
        transcript_summary:
          type: string
      required:
        - lead_name
        - detected_persona
        - pipeline_stage
        - document_names
        - transcript_summary

    EmailDraft:
      type: object
      properties:
        subject:
          type: string
        body:
          type: string
        template_used:
          type: string
      required:
        - subject
        - body
        - template_used

    Document:
      type: object
      properties:
        id:
          type: string
        file_code:
          type: string
        type:
          type: string
        name:
          type: string
        filename:
          type: string
        tier:
          type: integer
        category:
          type: string
        lifecycle_status:
          type: string
        review_state:
          type: string
        version:
          type: integer
        last_reviewed:
          type: string
        description:
          type: string
        pipeline_stage_relevance:
          type: array
          items:
            type: string
        persona_relevance:
          type: array
          items:
            type: string
        upstream_dependencies:
          type: array
          items:
            type: string
        downstream_dependents:
          type: array
          items:
            type: string
        is_generated:
