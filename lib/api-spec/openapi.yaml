        - name
        - filename
        - tier
        - category
        - lifecycle_status
        - review_state
        - version
        - last_reviewed
        - description
        - pipeline_stage_relevance
        - persona_relevance
        - upstream_dependencies
        - downstream_dependents
        - is_generated
        - source_trace

